name: Deploy to GitHub Pages

# Source lives on main; master is the published static site branch.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Publish dist to master branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: master
          folder: dist
          single-commit: true
